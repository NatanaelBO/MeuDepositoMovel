<section class="mdm-categories-section">
  <div class="container">

    <div class="mdm-section-heading">
      <span class="mdm-heading-bar"></span>
      <h2 class="mdm-heading-title">Categorias</h2>
    </div>

    <div class="row row-cols-2 row-cols-md-4 g-3">
      <div class="col" *ngFor="let category of categories">
        <a [routerLink]="category.link" class="mdm-category-card">
          <div class="mdm-category-icon-wrapper">
            <i class="bi" [ngClass]="category.icon"></i>
          </div>
          <span class="mdm-category-name">{{ category.name }}</span>
        </a>
      </div>
    </div>

  </div>
</section>
