<nav class="navbar navbar-expand-lg navbar-dark mdm-navbar sticky-top p-0">
  <div class="container-fluid px-3 py-2">

    <a class="navbar-brand mdm-brand" routerLink="/">
      MDM<span class="mdm-brand-dot">.</span>
    </a>

    <button
      class="navbar-toggler mdm-toggler"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#mdmNavbarContent"
      aria-controls="mdmNavbarContent"
      aria-expanded="false"
      aria-label="Abrir menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mdmNavbarContent">

      <div class="dropdown mdm-categories">
        <button
          class="btn mdm-categories-btn dropdown-toggle"
          type="button"
          id="categoriesDropdown"
          data-bs-toggle="dropdown"
          aria-expanded="false">
          Categorias
        </button>
        <ul class="dropdown-menu mdm-dropdown-menu" aria-labelledby="categoriesDropdown">
          <li *ngFor="let categoria of categories">
            <a class="dropdown-item mdm-dropdown-item" [routerLink]="categoria.link">{{ categoria.name }}</a>
          </li>
        </ul>
      </div>

      <form class="mdm-search-form flex-grow-1 mx-lg-3 my-2 my-lg-0" (ngSubmit)="onSearch()">
        <div class="input-group">
          <input
            type="search"
            class="form-control mdm-search-input"
            placeholder="Buscar cimento, tijolo, telha..."
            aria-label="Buscar produtos"
            [(ngModel)]="searchTerm"
            name="searchTerm">
          <button class="btn mdm-search-btn" type="submit" aria-label="Buscar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2.5"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65" stroke="currentColor" stroke-width="2.5"/>
            </svg>
          </button>
        </div>
      </form>

      <ul class="navbar-nav align-items-lg-center gap-lg-3">
        <li class="nav-item">
          <a class="nav-link mdm-nav-link" routerLink="/carrinho">
            <span class="mdm-cart-wrapper">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M4 4H6L8 15H18L20 7H7" stroke="currentColor" stroke-width="2"/>
                <circle cx="9" cy="20" r="1.5" fill="currentColor"/>
                <circle cx="17" cy="20" r="1.5" fill="currentColor"/>
              </svg>
              <span class="mdm-cart-badge" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
            </span>
            Carrinho
          </a>
        </li>
        <li class="nav-item mdm-divider" *ngIf="!authService.isLoggedIn()">
          <a class="nav-link mdm-nav-link" routerLink="/login">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
              <path d="M4 20C4 16 7.5 14 12 14C16.5 14 20 16 20 20" stroke="currentColor" stroke-width="2"/>
            </svg>
            Entrar
          </a>
        </li>
        <li class="nav-item mdm-divider" *ngIf="authService.isLoggedIn()">
          <a class="nav-link mdm-nav-link" href="javascript:void(0)" (click)="onLogout()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
              <path d="M4 20C4 16 7.5 14 12 14C16.5 14 20 16 20 20" stroke="currentColor" stroke-width="2"/>
            </svg>
            Sair
          </a>
        </li>
      </ul>

    </div>
  </div>
</nav>
